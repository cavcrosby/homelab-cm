---
use_default_rules: true
exclude_paths:
  - tests
  - .ansible-lint.yaml
  - .markdownlint.yaml
  - .pre-commit-config.yaml
  - .prettierrc.yaml
  - .yamllint.yaml
  - playbooks/vars/ansible_secrets.yml

rulesdir:
  - rules

skip_list:
  - no-changed-when
  - key-order
  - var-naming[no-reserved]
